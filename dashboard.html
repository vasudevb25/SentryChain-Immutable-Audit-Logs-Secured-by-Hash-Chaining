<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="sentrychain.png" />
    <title>SecureLog Dashboard</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap");

      :root {
        --bg: #081018;
        --card: #101826;
        --border: #1f2937;
        --accent: #00ff88;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --danger: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
      }

      header {
        padding: 16px 28px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #0f172a;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand img {
        height: 42px;
        width: auto;
      }

      .title {
        font-size: 24px;
        font-weight: 700;
        color: white;
        letter-spacing: 0.5px;
      }

      .title span {
        color: #38f872;
      }

      .status {
        color: #22c55e;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 12px;
        border: 1px solid #1e293b;
        border-radius: 20px;
        background: rgba(34, 197, 94, 0.08);
      }
      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: calc(100vh - 80px);
      }

      .sidebar {
        border-right: 1px solid var(--border);
        overflow: auto;
        background: #0b1220;
      }

      .main {
        overflow: auto;
        padding: 20px;
      }

      .section {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      .section h2 {
        font-size: 14px;
        margin-bottom: 15px;
        color: var(--accent);
      }

      input,
      textarea {
        width: 100%;
        background: #020617;
        color: white;
        border: 1px solid var(--border);
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        font-family: inherit;
      }

      button {
        width: 100%;
        padding: 12px;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }

      .stat-label {
        color: var(--muted);
        font-size: 12px;
      }

      .stat-value {
        font-size: 28px;
        margin-top: 10px;
        color: var(--accent);
      }

      .block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .block-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      .block-title {
        color: var(--accent);
        font-size: 18px;
        margin-bottom: 10px;
      }

      .meta {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.7;
        word-break: break-all;
      }

      .transactions {
        padding: 20px;
      }

      .tx {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        background: #0b1220;
      }

      .tx:last-child {
        margin-bottom: 0;
      }

      .tx-row {
        margin-bottom: 8px;
        word-break: break-all;
        font-size: 12px;
      }

      .label {
        color: var(--accent);
      }

      .message {
        margin-top: 10px;
        color: #d1d5db;
      }

      .verify-output {
        margin-top: 15px;
        padding: 15px;
        border-radius: 10px;
        background: #0b1220;
        border: 1px solid var(--border);
        font-size: 12px;
        line-height: 1.8;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <header>
      <div class="brand">
        <img src="sentrychain.png" alt="SentryChain Logo" />

        <div class="title">SentryChain <span>Dashboard</span></div>
      </div>

      <div class="status">● Blockchain Node Online</div>
    </header>

    <div class="layout">
      <div class="sidebar">
        <div class="section">
          <h2>Auditor Verification</h2>

          <textarea
            id="evidenceInput"
            rows="14"
            placeholder="Paste sample_evidence.json here..."
          ></textarea>

          <button onclick="verifyEvidence()">Verify Evidence</button>

          <div id="verifyResult" class="verify-output">
            Waiting for verification...
          </div>
        </div>
      </div>

      <div class="main">
        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Total Blocks</div>
            <div class="stat-value" id="totalBlocks">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Transactions</div>
            <div class="stat-value" id="totalTxs">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Unique Sources</div>
            <div class="stat-value" id="uniqueSources">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Latest Block</div>
            <div class="stat-value" id="latestBlock">0</div>
          </div>
        </div>

        <div id="blockContainer">
          <div class="loading">Loading blockchain...</div>
        </div>
      </div>
    </div>

    <script>
      async function loadBlockchain() {
        try {
          const response = await fetch("http://localhost:8000/chain");

          const data = await response.json();

          const chain = data.chain || data;

          renderDashboard(chain);
        } catch (error) {
          console.error(error);

          document.getElementById("blockContainer").innerHTML = `

            <div class="loading">
                Failed to connect to blockchain node
            </div>

        `;
        }
      }

      function renderDashboard(chain) {
        if (!chain || chain.length === 0) {
          return;
        }

        let totalTxs = 0;

        const sources = new Set();

        chain.forEach((block) => {
          totalTxs += block.transaction_count || 0;

          (block.transactions || []).forEach((tx) => {
            sources.add(tx.source_id);
          });
        });

        document.getElementById("totalBlocks").innerText = chain.length;

        document.getElementById("totalTxs").innerText = totalTxs;

        document.getElementById("uniqueSources").innerText = sources.size;

        document.getElementById("latestBlock").innerText =
          chain[chain.length - 1].index;

        const container = document.getElementById("blockContainer");

        container.innerHTML = "";

        [...chain].reverse().forEach((block) => {
          const blockDiv = document.createElement("div");

          blockDiv.className = "block";

          let txHTML = "";

          if (block.transactions.length > 0) {
            block.transactions.forEach((tx) => {
              const log = tx.payload_summary?.original_payload?.log || {};

              txHTML += `

                    <div class="tx">

                        <div class="tx-row">
                            <span class="label">TX ID:</span>
                            ${tx.tx_id}
                        </div>

                        <div class="tx-row">
                            <span class="label">Hash:</span>
                            ${tx.log_hash}
                        </div>

                        <div class="tx-row">
                            <span class="label">Source:</span>
                            ${tx.source_id}
                        </div>

                        <div class="tx-row">
                            <span class="label">Process:</span>
                            ${log.process || "unknown"}
                        </div>

                        <div class="tx-row">
                            <span class="label">Timestamp:</span>
                            ${tx.consensus_timestamp}
                        </div>

                        <div class="message">
                            ${log.message || "No log message"}
                        </div>

                    </div>

                `;
            });
          } else {
            txHTML = `

                <div class="tx">
                    Genesis Block
                </div>

            `;
          }

          blockDiv.innerHTML = `

            <div class="block-header">

                <div class="block-title">
                    Block #${block.index}
                </div>

                <div class="meta">

                    <div>
                        <strong>Hash:</strong>
                        ${block.block_hash}
                    </div>

                    <div>
                        <strong>Previous:</strong>
                        ${block.prev_hash}
                    </div>

                    <div>
                        <strong>Merkle Root:</strong>
                        ${block.merkle_root}
                    </div>

                    <div>
                        <strong>Timestamp:</strong>
                        ${block.timestamp}
                    </div>

                    <div>
                        <strong>Transactions:</strong>
                        ${block.transaction_count}
                    </div>

                </div>

            </div>

            <div class="transactions">

                ${txHTML}

            </div>

        `;

          container.appendChild(blockDiv);
        });
      }

      async function verifyEvidence() {
        const resultDiv = document.getElementById("verifyResult");

        try {
          const evidence = JSON.parse(
            document.getElementById("evidenceInput").value,
          );

          resultDiv.innerHTML = "Verifying evidence...";

          const response = await fetch("http://localhost:8000/audit/verify", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              evidence: evidence,
            }),
          });

          const result = await response.json();

          if (result.verified) {
            resultDiv.innerHTML = `

                ✅ VERIFIED<br><br>

                <strong>Block:</strong>
                ${result.block_index}<br>

                <strong>TX ID:</strong><br>
                ${result.tx_id}<br><br>

                <strong>Block Hash:</strong><br>
                ${result.block_hash}

            `;
          } else {
            resultDiv.innerHTML = `

                ❌ VERIFICATION FAILED<br><br>

                ${result.reason}

            `;
          }
        } catch (error) {
          resultDiv.innerHTML = `

            Invalid evidence JSON

        `;
        }
      }

      loadBlockchain();

      setInterval(() => {
        loadBlockchain();
      }, 5000);
    </script>
  </body>
</html>
